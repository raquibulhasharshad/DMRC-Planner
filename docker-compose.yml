services:
  backend:
    build:
      context: ./Backend/metro
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./Backend/.env
    restart: always

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    env_file:
      - ./Frontend/.env
    depends_on:
      - backend
    restart: always
